name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "shared/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @belajarsql/shared build

      - name: Build frontend
        run: pnpm --filter @belajarsql/frontend build
        env:
          # Points the static frontend at the deployed Render backend.
          # Set this repo variable in Settings -> Secrets and variables ->
          # Actions -> Variables once the backend has a live URL.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          # Served at https://<user>.github.io/<repo>/ (no custom domain
          # yet), so asset URLs need that subpath prefix or every JS/CSS
          # request 404s and the page stays blank. Once a custom domain is
          # in front (served from the root), delete this line so base goes
          # back to the vite.config.ts default of "/".
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
