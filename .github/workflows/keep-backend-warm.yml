name: Keep Render backend warm

# Optional mitigation for Render's free-tier cold start (~30-50s after ~15min
# idle). Pings /api/health every 10 minutes. Delete this workflow, or leave
# BACKEND_HEALTH_URL unset, if the cold start turns out not to matter for
# actual class usage.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          if [ -z "${{ vars.BACKEND_HEALTH_URL }}" ]; then
            echo "BACKEND_HEALTH_URL repo variable not set — skipping."
            exit 0
          fi
          curl -sf "${{ vars.BACKEND_HEALTH_URL }}" || echo "Ping failed (backend may be cold-starting)."
